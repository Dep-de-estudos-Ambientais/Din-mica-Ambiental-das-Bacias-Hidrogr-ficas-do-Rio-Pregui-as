<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bacia do Rio Preguiças - Mapa Interativo</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">
    <aside class="sidebar" id="sidebar">
      <button class="toggle-btn" id="toggleBtn" title="Recolher/Expandir menu">
        <span id="toggleArrow">◀</span>
      </button>

      <div class="header">
        <h1>Bacia do Rio Preguiças</h1>
        <p>Mapa interativo das principais camadas ambientais</p>
        <div class="dept-badge">Departamento de Estudos Ambientais</div>
      </div>

      <section class="panel">
        <h2>Controle de Camadas</h2>

        <div class="layer-item">
          <input type="checkbox" id="chk_limite" checked>
          <label for="chk_limite">Limite da Bacia</label>
        </div>

        <div class="layer-item">
          <input type="checkbox" id="chk_municipios" checked>
          <label for="chk_municipios">Municípios da Bacia</label>
        </div>

        <div class="layer-item">
          <input type="checkbox" id="chk_rios" checked>
          <label for="chk_rios">Corpos d'água</label>
        </div>

        <div class="layer-item">
          <input type="checkbox" id="chk_lagos" checked>
          <label for="chk_lagos">Lagos</label>
        </div>

        <div class="layer-item">
          <input type="checkbox" id="chk_uc" checked>
          <label for="chk_uc">Unidades de Conservação</label>
        </div>
      </section>

      <section class="panel">
        <h2>Legenda</h2>

        <div class="legend-item">
          <span class="legend-box limite"></span>
          <span>Limite da Bacia</span>
        </div>

        <div class="legend-item">
          <span class="legend-box municipios"></span>
          <span>Municípios</span>
        </div>

        <div class="legend-item">
          <span class="legend-box rios"></span>
          <span>Corpos d'água</span>
        </div>

        <div class="legend-item">
          <span class="legend-box lagos"></span>
          <span>Lagos</span>
        </div>

        <div class="legend-item">
          <span class="legend-box uc"></span>
          <span>Unidades de Conservação</span>
        </div>
      </section>

      <section class="panel">
        <h2>Controles</h2>

        <div class="slider-group">
          <label for="opacityRange">Transparência das camadas poligonais</label>
          <input type="range" id="opacityRange" min="0" max="100" value="55">
          <div class="slider-labels">
            <span>Transparente</span>
            <span>Opaco</span>
          </div>
        </div>

        <div class="button-grid">
          <button class="btn" id="btnVista">🗺 Ajustar Vista</button>
          <button class="btn" id="btnBase">🛰 Alterar Mapa</button>
          <button class="btn" id="btnExportar">💾 Exportar Limite</button>
        </div>
      </section>

      <section class="panel status-panel">
        <h2>Status</h2>
        <div id="statusBox">
          Carregando dados...
        </div>
      </section>
    </aside>

    <main id="map"></main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
